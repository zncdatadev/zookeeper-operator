apiVersion: v1
kind: Service
metadata:
  name: test-zk-metrics-server-default-metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9505"
    prometheus.io/scheme: "http"
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 9505
      protocol: TCP
      targetPort: metrics
  selector:
    zookeeper.kubedoop.dev/cluster: test-zk-metrics
    zookeeper.kubedoop.dev/role: server
    zookeeper.kubedoop.dev/role-group: default
