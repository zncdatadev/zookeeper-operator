apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: smoke-multi-rolegroup
spec:
  bindings:
    - name: zookeeper_version
      value: ($values.product_version)
  steps:
  - name: install a two-role-group cluster
    try:
    - apply:
        file: zk.yaml
    # Both StatefulSets becoming ready already requires the members to agree on one quorum.
    - assert:
        file: zk-assert.yaml
  - name: verify the server list spans both groups with unique myids
    try:
    - script:
        env:
          - name: NAMESPACE
            value: ($namespace)
        content: |
          #!/bin/bash
          set -euo pipefail
          # zoo.cfg on a default-group pod must list all three members, including the secondary
          # group's pod (server.3), not just its own group.
          cfg=$(kubectl -n "$NAMESPACE" exec test-zk-server-default-0 -c zookeeper -- cat /kubedoop/config/zoo.cfg)
          echo "$cfg" | grep -qE '^server\.1=.*test-zk-server-default-0\.'
          echo "$cfg" | grep -qE '^server\.2=.*test-zk-server-default-1\.'
          echo "$cfg" | grep -qE '^server\.3=.*test-zk-server-secondary-0\.'
          # myids are unique across groups: default -> 1,2 ; secondary -> 3.
          [ "$(kubectl -n "$NAMESPACE" exec test-zk-server-default-0   -c zookeeper -- cat /kubedoop/data/myid)" = "1" ]
          [ "$(kubectl -n "$NAMESPACE" exec test-zk-server-default-1   -c zookeeper -- cat /kubedoop/data/myid)" = "2" ]
          [ "$(kubectl -n "$NAMESPACE" exec test-zk-server-secondary-0 -c zookeeper -- cat /kubedoop/data/myid)" = "3" ]
  - name: verify the two groups share one ensemble (cross-group read)
    try:
    - script:
        env:
          - name: NAMESPACE
            value: ($namespace)
        content: |
          #!/bin/bash
          set -uo pipefail
          # Write through the default group and read it back through the secondary group. If the
          # groups were separate quorums the node would not exist on the secondary. zkCli opens a
          # fresh session per call and can hit a transient ConnectionLoss under load, so retry;
          # a genuine split would surface as a stable "Node does not exist", not a read of "hello".
          write() { kubectl -n "$NAMESPACE" exec test-zk-server-default-0 -c zookeeper -- \
            bin/zkCli.sh -server 127.0.0.1:2282 create /multi-rg-probe hello 2>&1; }
          read_probe() { kubectl -n "$NAMESPACE" exec test-zk-server-secondary-0 -c zookeeper -- \
            bin/zkCli.sh -server 127.0.0.1:2282 get /multi-rg-probe 2>&1; }

          for i in $(seq 1 10); do
            w=$(write)
            if echo "$w" | grep -qE "Created /multi-rg-probe|NodeExists"; then break; fi
            echo "write attempt $i: $(echo "$w" | tail -1)"; sleep 5
          done
          echo "$w" | grep -qE "Created /multi-rg-probe|NodeExists"

          for i in $(seq 1 10); do
            out=$(read_probe)
            if echo "$out" | grep -q "hello"; then echo "cross-group read OK"; exit 0; fi
            # A real split ensemble returns a stable NoNode, not a transient ConnectionLoss.
            if echo "$out" | grep -q "Node does not exist"; then
              echo "SPLIT ENSEMBLE: secondary group cannot see the default group's znode"; exit 1
            fi
            echo "read attempt $i: $(echo "$out" | tail -1)"; sleep 5
          done
          echo "cross-group read did not succeed after retries"; exit 1
