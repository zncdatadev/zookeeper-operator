apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: smoke-min-server-id
spec:
  bindings:
    - name: zookeeper_version
      value: ($values.product_version)
  steps:
  - name: install zookeeper with a non-default minServerId
    try:
    - apply:
        file: zk.yaml
    # availableReplicas=3 already proves the quorum formed with minServerId=5.
    - assert:
        file: zk-assert.yaml
  - name: verify myid files match the server.N ids
    try:
    - script:
        env:
          - name: NAMESPACE
            value: ($namespace)
        content: |
          #!/bin/bash
          set -u
          # Each pod's on-disk myid must equal minServerId + ordinal (5,6,7), and zoo.cfg must
          # advertise exactly server.5/6/7 (not server.1..3). Retry the exec-based checks: a pod can
          # restart once while the ensemble forms, and an exec racing that restart would fail spuriously.
          check() {
            for ordinal in 0 1 2; do
              want=$((5 + ordinal))
              got=$(kubectl -n "$NAMESPACE" exec "test-zk-server-default-${ordinal}" -c zookeeper -- cat /kubedoop/data/myid 2>/dev/null) || return 1
              echo "pod ${ordinal}: myid=${got} want=${want}"
              [ "$got" = "$want" ] || return 1
            done
            cfg=$(kubectl -n "$NAMESPACE" exec test-zk-server-default-0 -c zookeeper -- cat /kubedoop/config/zoo.cfg 2>/dev/null) || return 1
            echo "$cfg" | grep -qE '^server\.5=' || return 1
            echo "$cfg" | grep -qE '^server\.7=' || return 1
            # server.1 must NOT appear (would mean minServerId was ignored).
            ! echo "$cfg" | grep -qE '^server\.1='
          }
          for i in $(seq 1 12); do
            if check; then echo "myid/server.N OK"; exit 0; fi
            echo "attempt $i: not ready yet"; sleep 5
          done
          echo "myid / server.N verification failed after retries"; exit 1
