apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: smoke-min-server-id
spec:
  bindings:
    - name: zookeeper_version
      value: ($values.product_version)
  steps:
  - name: install zookeeper with a non-default minServerId
    try:
    - apply:
        file: zk.yaml
    # availableReplicas=3 already proves the quorum formed with minServerId=5.
    - assert:
        file: zk-assert.yaml
  - name: verify myid files match the server.N ids
    try:
    - script:
        env:
          - name: NAMESPACE
            value: ($namespace)
        content: |
          #!/bin/bash
          set -euo pipefail
          # Each pod's on-disk myid must equal minServerId + ordinal (5,6,7)...
          for ordinal in 0 1 2; do
            want=$((5 + ordinal))
            got=$(kubectl -n "$NAMESPACE" exec "test-zk-server-default-${ordinal}" -c zookeeper -- cat /kubedoop/data/myid)
            echo "pod ${ordinal}: myid=${got} want=${want}"
            [ "$got" = "$want" ]
          done
          # ...and zoo.cfg must advertise exactly server.5, server.6, server.7 (not server.1..3).
          cfg=$(kubectl -n "$NAMESPACE" exec test-zk-server-default-0 -c zookeeper -- cat /kubedoop/config/zoo.cfg)
          echo "$cfg" | grep -qE '^server\.5='
          echo "$cfg" | grep -qE '^server\.7='
          if echo "$cfg" | grep -qE '^server\.1='; then
            echo "unexpected server.1 entry (myid numbering did not honor minServerId)"; exit 1
          fi
